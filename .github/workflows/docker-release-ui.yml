name: Build and Push Harmony Speech Engine UI Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the build'
        default: 'v0.0.0-dev'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set VERSION variable
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Determine Frontend Reference
        shell: bash
        run: |
          if curl -s -o /dev/null -w "%{http_code}" "https://api.github.com/repos/harmony-ai-solutions/harmony-link-ui/git/refs/tags/$VERSION" | grep -q "200"; then
            echo "Frontend tag $VERSION found, using tag"
            echo "FRONTEND_REF=$VERSION" >> $GITHUB_ENV
          else
            echo "Frontend tag $VERSION not found, using main branch"
            echo "FRONTEND_REF=main" >> $GITHUB_ENV
          fi

      - name: Checkout Frontend UI Source
        shell: bash
        run: |
          echo "Preparing frontend source from harmony-link-ui at ref: $FRONTEND_REF"
          rm -rf frontend
          git clone --depth 1 --branch "$FRONTEND_REF" https://github.com/harmony-ai-solutions/harmony-link-ui.git frontend
          echo "Frontend source checkout complete."

      - name: Log selected frontend ref and Dockerfile
        shell: bash
        run: |
          echo "Using FRONTEND_REF=$FRONTEND_REF"
          echo "Using Dockerfile=./frontend/Dockerfile.speech-engine"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push harmonyspeech-ui image
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.speech-engine
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/harmonyspeech-ui:${{ env.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/harmonyspeech-ui:latest
