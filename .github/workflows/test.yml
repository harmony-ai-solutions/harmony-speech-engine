      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            hf-models-${{ runner.os }}-
            hf-models-

      - name: Run KittenTTS E2E tests
        run: |
          python -m pytest -k "kittentts" tests/e2e/ --device=cpu --dtype=float32 -v --tb=short

