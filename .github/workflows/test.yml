name: Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Run Tests (Python 3.12, CPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run pytest (CPU-only mode)
        run: |
          python -m pytest --device=cpu --dtype=float32 -v --tb=short -m "not e2e"

  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-pip-${{ hashFiles('requirements-common.txt') }}
          restore-keys: |
            ${{ runner.os }}-lint-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black>=24.0.0 flake8>=7.0.0

      - name: Check formatting with black
        run: |
          black --check --diff harmonyspeech/ tests/

      - name: Check style with flake8
        run: |
          flake8 harmonyspeech/ tests/

  e2e-kittentts:
    name: E2E KittenTTS (CPU)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run KittenTTS E2E tests
        run: |
          python -m pytest -k "kittentts" tests/e2e/ --device=cpu --dtype=float32 -v --tb=short

  e2e-melotts-openvoice-v2:
    name: E2E MeloTTS and OpenVoice V2 (CPU)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run MeloTTS and OpenVoice V2 E2E tests
        run: |
          python -m pytest -k "melotts or openvoice_v2" tests/e2e/ --device=cpu --dtype=float32 -v --tb=short

  e2e-openvoice-v1:
    name: E2E OpenVoice V1 (CPU)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run OpenVoice V1 E2E tests
        run: |
          python -m pytest -k "openvoice_v1" tests/e2e/ --device=cpu --dtype=float32 -v --tb=short

  e2e-harmonyspeech:
    name: E2E HarmonySpeech (CPU)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run HarmonySpeech E2E tests
        run: |
          python -m pytest -k "harmonyspeech" tests/e2e/ --device=cpu --dtype=float32 -v --tb=short
