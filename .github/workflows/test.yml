name: Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Run Tests (Python 3.12, CPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run pytest (CPU-only mode)
        run: |
          python -m pytest --device=cpu --dtype=float32 -v --tb=short

  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-pip-${{ hashFiles('requirements-common.txt') }}
          restore-keys: |
            ${{ runner.os }}-lint-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black>=24.0.0 flake8>=7.0.0

      - name: Check formatting with black
        run: |
          black --check --diff harmonyspeech/ tests/

      - name: Check style with flake8
        run: |
          flake8 harmonyspeech/ tests/
