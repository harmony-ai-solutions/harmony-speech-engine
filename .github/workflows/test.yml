name: Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Unit & Integration Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-common.txt', 'requirements-cpu.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmecab-dev ffmpeg libsndfile1 espeak-ng

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cpu.txt
          pip install -r requirements-common.txt

      - name: Run unit and integration tests
        run: |
          python -m pytest --device=cpu --dtype=float32 -v --tb=short -m "not e2e"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-pip-${{ hashFiles('requirements-common.txt') }}
          restore-keys: |
            ${{ runner.os }}-lint-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black>=24.0.0 flake8>=7.0.0

      - name: Check formatting with black
        run: |
          black --check --diff harmonyspeech/ tests/

      - name: Check style with flake8
        run: |
          flake8 harmonyspeech/ tests/

  e2e-kittentts:
    name: E2E KittenTTS (CPU)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 100
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-docker-images: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
